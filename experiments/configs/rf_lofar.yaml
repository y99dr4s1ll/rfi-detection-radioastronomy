# Dataset
dataset: lofar
data_path: data/raw/lofar

# Method
method: rf

# RF parameters
n_estimators: 100
max_depth: null
min_samples_split: 2
min_samples_leaf: 1
max_features: null
bootstrap: true

# Feature extraction
patch_size: 8
k_cusum: 0.21

# Preprocessing
max_samples: 500
clip_min: 1.0e-7
clip_max: 32597745.5

# Undersampling
undersampling_ratio: 5

# Evaluation
img_size: 512
batch_size: 500
n_thresholds: 18

# Features cache
features_train_path: experiments/results/features_rf_lofar_train.csv
features_test_path: experiments/results/features_rf_lofar_test.csv

# Output
results_path: experiments/results/rf_lofar.csv
plot_path: experiments/results/rf_lofar_sample.png